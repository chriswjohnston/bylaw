name: Scrape Nipissing By-Laws

# Trigger: every 2 weeks on the 1st and 15th, or manual trigger
on:
  schedule:
    - cron: '0 8 1,15 * *'  # 8am UTC → 3am EST
  workflow_dispatch:          # allows manual trigger from GitHub

permissions:
  contents: write            # required to push changes to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo so workflow has access to code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python 3.12 environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3️⃣ Install required Python dependencies for scraper
      - name: Install dependencies
        run: pip install requests beautifulsoup4 pymupdf anthropic

      # 4️⃣ Run the scraper
      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e  # stop workflow if scraper fails
          python scrape.py

      # 5️⃣ Optional: Debug step to verify what files were generated
      - name: Debug scraper output
        run: |
          echo "Files in site/:"
          ls -R site/

      # 6️⃣ Commit and push changes safely
      - name: Commit and push changes
        run: |
          git config user.name "By-Law Scraper Bot"
          git config user.email "bot@chriswjohnston.ca"
      
          # Ensure base folder exists
          mkdir -p site
      
          # Stage JSON if it exists
          if [ -f site/bylaws-data.json ]; then
            git add site/bylaws-data.json
          fi
      
          # Stage bylaws folder ONLY if it has files
          if [ -d site/bylaws ] && [ "$(ls -A site/bylaws 2>/dev/null)" ]; then
            git add site/bylaws/
          fi
      
          # Only commit if something is staged
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Safe bylaw count (won’t crash if file is empty or malformed)
            if [ -f site/bylaws-data.json ]; then
              BYLAW_COUNT=$(python -c "import json; 
      try:
       d=json.load(open('site/bylaws-data.json')); 
       print(len(d.get('bylaws', [])))
      except:
       print(0)")
            else
              BYLAW_COUNT=0
            fi
      
            git commit -m "Update by-law archive — ${BYLAW_COUNT} by-laws [automated]"
            git push
          fi
