name: Scrape Nipissing By-Laws

on:
  schedule:
    # Run every 2 weeks on Monday at 8am UTC (3am EST)
    - cron: '0 8 1,15 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pymupdf anthropic

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrape.py

      - name: Commit and push changes
        run: |
          git config user.name "By-Law Scraper Bot"
          git config user.email "bot@chriswjohnston.ca"
          git add site/bylaws-data.json site/bylaws/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            BYLAW_COUNT=$(python -c "import json; d=json.load(open('site/bylaws-data.json')); print(len(d['bylaws']))")
            git commit -m "Update by-law archive — ${BYLAW_COUNT} by-laws [automated]"
            git push
          fi
