name: Scrape Nipissing By-Laws

on:
  schedule:
    - cron: '0 8 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pymupdf anthropic

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          python scrape.py

      - name: Debug scraper output
        run: |
          echo "Current directory:"
          pwd
          echo "Repo contents:"
          ls -R
          echo "Site contents:"
          ls -R site/ || echo "No site directory yet"

      - name: Commit and push changes
        run: |
          git config user.name "By-Law Scraper Bot"
          git config user.email "bot@chriswjohnston.ca"

          mkdir -p site

          if [ -f site/bylaws-data.json ]; then
            git add site/bylaws-data.json
          fi

          if [ -d site/bylaws ] && [ "$(ls -A site/bylaws 2>/dev/null)" ]; then
            git add site/bylaws/
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            BYLAW_COUNT=$(python -c "import json, os; f='site/bylaws-data.json'; print(len(json.load(open(f)).get('bylaws', [])) if os.path.exists(f) else 0)")
            git commit -m "Update by-law archive — ${BYLAW_COUNT} by-laws [automated]"
            git push
          fi
